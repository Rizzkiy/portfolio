<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Catur</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body {
            background: #f8f9fa;
            color: #222;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            min-height: 100vh;
        }
        .contact-container {
            max-width: 400px;
            margin: 60px auto;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.07);
            padding: 36px 28px;
            text-align: center;
            animation: fadeInUp 0.8s;
        }
        h1 {
            color: #3498db;
            margin-bottom: 18px;
            font-size: 2em;
        }
        .contact-info {
            margin-bottom: 28px;
        }
        .contact-info a {
            display: inline-block;
            margin: 0 10px;
            color: #222;
            font-size: 2em;
            transition: color 0.2s, transform 0.2s;
        }
        .contact-info a.instagram { color: #e1306c; }
        .contact-info a.tiktok { color: #000; }
        .contact-info a:hover {
            color: #3498db;
            transform: scale(1.15) rotate(-8deg);
        }
        form {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        input, textarea {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 1em;
            resize: vertical;
        }
        textarea {
            min-height: 80px;
        }
        button {
            background: #3498db;
            color: #fff;
            border: none;
            padding: 10px 0;
            border-radius: 6px;
            font-size: 1em;
            cursor: pointer;
            transition: background 0.2s, transform 0.2s;
        }
        button:hover {
            background: #222;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="contact-container">
        <h1>Kontak Saya</h1>
        <div class="contact-info">
            <a href="gmail:rizkicatur24@email.com" title="Email"><i class="fas fa-envelope"></i></a>
            <a href="https://www.instagram.com/rizky._catur/" target="_blank" class="instagram" title="Instagram"><i class="fab fa-instagram"></i></a>
            <a href="https://www.tiktok.com/@rizzkiy._" target="_blank" class="tiktok" title="Tiktok"><i class="fab fa-tiktok"></i></a>
        </div>
        <form>
            <input type="text" placeholder="Nama Anda" required>
            <input type="email" placeholder="Email Anda" required>
            <textarea placeholder="Pesan Anda" required></textarea>
            <button type="submit">Kirim Pesan</button>
        </form>
    </div>
</body>
</html>
